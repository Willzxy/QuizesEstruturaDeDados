<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogar - Quizes</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="style.css">
</head>
<body>

    <header class="quiz-header">
        <h1>Qui<span class="highlight">|</span>es</h1>
        <div class="progress-container">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
        <p class="subtitle" id="question-counter">Pergunta 1 de 10</p>
    </header>

    <main class="quiz-main">
        <div id="quiz-area" class="card unlocked quiz-card">
            <h2 id="question-text" class="question-title">A carregar pergunta...</h2>
            
            <div id="options-container" class="options-grid">
            </div>

            <button id="next-btn" class="btn-primary" disabled>Próxima Pergunta</button>
        </div>

        <div id="save-area" class="card unlocked quiz-card hidden">
            <h2 class="question-title">Fim de Jogo!</h2>
            <div class="score-display">
                <span id="score-text" class="highlight score-number">0</span>
                <p>Pontos de 100 possíveis</p>
            </div>
            
            <div class="stats-grid">
                <div class="stat-box correct">
                    <span id="correct-answers">0</span>
                    <p>Acertos</p>
                </div>
                <div class="stat-box wrong">
                    <span id="wrong-answers">0</span>
                    <p>Erros</p>
                </div>
            </div>

            <div style="margin-top: 25px;">
                <input type="text" id="username-input" placeholder="Introduza o seu nome para o ranking" style="width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #ccc; font-family: inherit; font-size: 16px;">
                <button id="save-score-btn" class="btn-primary">Guardar e Ver Ranking</button>
            </div>
        </div>

        <div id="leaderboard-area" class="card unlocked quiz-card hidden">
            <h2 class="question-title">🏆 Top 10 Melhores 🏆</h2>
            
            <ul id="leaderboard-list" style="list-style: none; padding: 0; margin: 20px 0; text-align: left;">
                <li style="text-align: center;">A carregar ranking...</li>
            </ul>

            <button onclick="window.location.reload()" class="btn-secondary">Jogar Novamente</button>
        </div>
    </main>

    <script type="module" src="jogar.js"></script>
</body>
</html>
